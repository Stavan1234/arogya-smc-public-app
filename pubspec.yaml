name: flutter_projects
description: "Arogya SMC – Citizen Health Access App for Solapur Municipal Corporation"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1

  # State management
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # Networking
  http: ^1.2.1

  # Local caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^12.0.0

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
